<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/TempleTrust-frontend/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View upcoming temple events, festivals, and poojas. Book online seva and special ceremonies.">
    <title>Events & Poojas - Shri Shyam Mandir</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <i class="fas fa-om"></i>
                    <span>श्री श्याम मंदिर</span>
                </div>
                
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="donate.html">Donate</a></li>
                    <li><a href="events.html" class="active">Events & Poojas</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                
                <div class="nav-right">
                    <a href="donate.html" class="btn btn-primary">Donate Now</a>
                    <button class="mobile-menu-btn" id="mobileMenuBtn">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1><i class="fas fa-calendar-alt"></i> Events & Poojas</h1>
            <p>Upcoming festivals and special ceremonies</p>
        </div>
    </section>

    <section class="events-list-section section-padding">
        <div class="container">
            <div class="events-filter">
                <button class="filter-btn active" data-filter="all">All Events</button>
                <button class="filter-btn" data-filter="Festival">Festivals</button>
                <button class="filter-btn" data-filter="Pooja">Poojas</button>
                <button class="filter-btn" data-filter="Special Event">Special Events</button>
            </div>

            <div class="events-grid" id="eventsGrid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <div class="footer-logo">
                        <i class="fas fa-om"></i>
                        <span>श्री श्याम मंदिर</span>
                    </div>
                    <div class="social-links">
                        <a href="https://www.facebook.com/shyammandirrohtak/" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
                    </div>
                </div>
            </div>
            
            <div class="footer-bottom">
                <p>&copy; 2025 श्री श्याम मंदिर. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <button class="scroll-top" id="scrollTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="js/main.js"></script>
    <script src="js/events.js"></script>
